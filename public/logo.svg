<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4361EE"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="micbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E0E8FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" rx="80" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="200" rx="80" fill="url(#shine)"/>

  <!-- Mic body -->
  <rect x="152" y="48" width="96" height="148" rx="48" fill="url(#micbody)"/>

  <!-- Mic grille lines -->
  <line x1="162" y1="90"  x2="238" y2="90"  stroke="#4361EE" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="158" y1="110" x2="242" y2="110" stroke="#4361EE" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="156" y1="130" x2="244" y2="130" stroke="#4361EE" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="157" y1="150" x2="243" y2="150" stroke="#4361EE" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="160" y1="170" x2="240" y2="170" stroke="#4361EE" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Mic arc stand -->
  <path d="M140 215 Q140 268 200 268 Q260 268 260 215" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="7" stroke-linecap="round"/>

  <!-- Mic pole -->
  <line x1="200" y1="268" x2="200" y2="308" stroke="rgba(255,255,255,0.92)" stroke-width="7" stroke-linecap="round"/>

  <!-- Mic base -->
  <rect x="168" y="306" width="64" height="10" rx="5" fill="rgba(255,255,255,0.92)"/>

  <!-- Sound waves left -->
  <path d="M126 168 Q114 200 126 232" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="5" stroke-linecap="round"/>
  <path d="M106 152 Q88 200 106 248" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>

  <!-- Sound waves right -->
  <path d="M274 168 Q286 200 274 232" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="5" stroke-linecap="round"/>
  <path d="M294 152 Q312 200 294 248" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>

  <!-- iMeets wordmark -->
  <text x="200" y="356" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-2" fill="white">iMeets</text>

  <!-- Tagline -->
  <text x="200" y="384" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="400" letter-spacing="4" fill="rgba(255,255,255,0.6)">AI RECORDER</text>
</svg>
